<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Roll Detector Tester</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #111; color: #fff; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        .video-container { position: relative; width: 640px; height: 480px; background: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status { padding: 15px; background: #222; border-radius: 8px; font-family: monospace; }
        .roll-indicator { padding: 20px; font-size: 24px; text-align: center; border-radius: 8px; background: #333; transition: background 0.2s; }
        .roll-active { background: #4CAF50; color: white; font-weight: bold; }
        .controls { display: flex; gap: 10px; align-items: center; padding: 15px; background: #222; border-radius: 8px; }
        input[type="range"] { flex: 1; }
    </style>
</head>
    <div class="container">
        <h1>Eye Roll Validator</h1>
        
        <div class="controls" style="flex-wrap: wrap;">
            <div style="flex-basis: 100%; display: flex; gap: 10px;">
                <label for="sensitivity">Sensitivity:</label>
                <input type="range" id="sensitivity" min="10" max="90" value="50">
                <span id="sensitivity-val">50</span>
            </div>
            
            <div style="flex-basis: 100%; display: flex; gap: 10px; margin-top: 10px;">
                <button id="btn-cal-neutral" style="padding: 10px; flex: 1; background: #444; color: white; border: none; border-radius: 4px; cursor: pointer;">Hold to Record Neutral</button>
                <button id="btn-cal-roll" style="padding: 10px; flex: 1; background: #444; color: white; border: none; border-radius: 4px; cursor: pointer;">Hold to Record Eye Roll</button>
            </div>
            <div id="cal-status" style="width: 100%; text-align: center; margin-top: 10px; font-weight: bold; color: yellow;"></div>
            <div id="cal-result" style="width: 100%; margin-top: 5px;">Calibration data...</div>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <div class="roll-indicator" id="indicator">Waiting for eye roll...</div>
        <div class="status" id="log">Initializing...</div>
    </div>
    <script type="module" src="/tester.ts"></script>
</body>
</html>
